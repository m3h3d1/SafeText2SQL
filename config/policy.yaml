allowed_statement_types:
  - select
allowed_tables:
  - patients
allowed_columns:
  patients:
    - id
    - name
    - age
    - gender
allow_wildcard_select: false
blocked_tokens:
  - "--"
  - ";"
  - "/*"
  - "*/"
blocked_regex:
  - "(?i)\\bor\\s+1\\s*=\\s*1\\b"
  - "(?i)\\bunion\\b"
  - "(?i)\\bdrop\\b"
  - "(?i)\\bdelete\\b"
  - "(?i)\\binsert\\b"
  - "(?i)\\bupdate\\b"
blocked_functions:
  - sleep
  - pg_sleep
  - benchmark
  - load_file
  - randomblob
max_rows: 100
timeout_seconds: 2
